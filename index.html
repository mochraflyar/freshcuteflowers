<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <title>Fresh Cute Flower – Pesan Sekarang</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- CSS dipisah ke file sendiri -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- FORM PEMESANAN -->
  <div class="container">
    <div class="header">
      <div class="logo-container">
        <img src="assets/logo.png" alt="Fresh Cute Flower" class="logo-img">
      </div>
      <h1>Fresh Cute Flower</h1>
      <p>Buket cantik untuk momen berhargamu 🌷</p>
    </div>

    <div id="orderForm">
      <div class="form-group">
        <label for="nama">🌸 Nama Lengkap</label>
        <input type="text" id="nama" class="form-control" placeholder="Masukkan nama kamu...">
      </div>
      <div class="form-group">
        <label for="nohp">📱 Nomor WhatsApp</label>
        <input type="tel" id="nohp" class="form-control" placeholder="Contoh: 08123456xxx">
      </div>
      <div class="form-group">
        <label for="produk">💐 Pilih Paket Buket</label>
        <select id="produk" class="form-control">
          <option value="" disabled selected>-- Pilih Buket --</option>
          <option value="Buket 10K">Buket 10K</option>
        </select>
      </div>
      <div class="form-group">
        <label for="jumlah">🔢 Jumlah Order (Pcs)</label>
        <input type="number" id="jumlah" class="form-control" min="1" value="1">
      </div>
      <div class="form-group">
        <label for="tanggal">📅 Tanggal Pengiriman / Pengambilan</label>
        <input type="date" id="tanggal" class="form-control">
      </div>
      <div class="form-group">
        <label for="alamat">📍 Alamat Lengkap Pengiriman</label>
        <textarea id="alamat" class="form-control" placeholder="Tulis alamat rumah lengkap atau tulis 'Ambil di Toko' jika ingin ambil sendiri..."></textarea>
      </div>
      <div class="form-group">
        <label for="catatan">📝 Catatan Tambahan (Opsional)</label>
        <textarea id="catatan" class="form-control" placeholder="Contoh: Warna pembungkus minta ganti merah muda, kartu ucapan diisi teks..."></textarea>
      </div>
      <button type="button" class="btn-submit" onclick="submitOrder()">Kirim Pesanan ✨</button>
    </div>
  </div>

  <!-- Divider dekoratif -->
  <div class="section-divider"><span>🌸</span></div>

  <!-- SECTION CEK STATUS PESANAN -->
  <div class="history-section">
    <div class="history-title">
      Cek Status Pesananmu
      <span>Masukkan nomor WhatsApp yang kamu gunakan saat pesan</span>
    </div>
    <div class="history-search-box">
      <label for="searchHp">📱 Nomor WhatsApp kamu</label>
      <div class="search-row">
        <input type="tel" id="searchHp" placeholder="Contoh: 628123456xxx"
          onkeydown="if(event.key==='Enter') searchHistory()"/>
        <button class="btn-search" onclick="searchHistory()">🔍 Cek Pesanan</button>
      </div>
    </div>
    <div class="history-results" id="historyResults"></div>
  </div>

  <!-- Toast notifikasi -->
  <div class="toast" id="toast">Pesananmu sukses terkirim! 🌷</div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- JavaScript dipisah ke file sendiri -->
  <script src="js/main.js"></script>
</body>
</html>
